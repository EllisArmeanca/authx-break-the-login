<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - AuthX</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #007BFF;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Register</h1>

        <form method="POST"  autocomplete="off">
            <div>
                <label>Email</label>
                <input type="text" name="email" required>
            </div>

            <div>
                <label>Password</label>
                <input type="text" name="password" required>
            </div>

            <div>
                <label>Role</label>
                <select name="role">
                    <option value="ANALYST">ANALYST</option>

                    {% if not manager_exists %}
                        <option value="MANAGER">MANAGER</option>
                    {% endif %}
                </select>
            </div>

            <button type="submit">Create account</button>
        </form>

        <a href="/login">Go to login</a>
    </div>

</body>
</html>

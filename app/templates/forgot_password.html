<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - AuthX</title>
</head>
<body>
    <h1>Forgot Password</h1>

    <form method="POST">
        <div>
            <label>Email</label>
            <input type="text" name="email" required>
        </div>

        <button type="submit">Generate reset link</button>
    </form>

    <p><a href="/login">Back to login</a></p>
</body>
</html>

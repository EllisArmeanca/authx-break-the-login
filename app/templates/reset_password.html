<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - AuthX</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Reset Password</h1>

        <form method="POST" autocomplete="off">
            <div>
                <label>New password</label>
                <input type="text" name="password" required>
            </div>

            <button type="submit">Set new password</button>
        </form>
    </div>

</body>
</html>
